name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Vita gate note: scripts/verify.sh runs Nim --compileOnly codegen under
# -d:vita (--os:linux --cpu:amd64) and validates the generated C against
# tests/stubs/raylib.h via gcc -fsyntax-only. No VitaSDK / arm-vita-eabi-gcc
# required. This is type-check + C codegen only — NOT a cross-compile.
#
# Keep tests/stubs/raylib.h in sync with symbols asserted by
# tests/verify_raylib_codegen.nim and the naylib raylib.h surface.
# The Vita console headers are an external reference (see raddy-5ce HOST_SYMBOL_VERIFY).

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop — nimble check + nimble test (Nim 2.2.x)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim 2.2.x
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.x'

      - name: Install bddy (test framework)
        run: nimble install -y "https://github.com/mattsp1290/bddy"

      - name: Install naylib (raylib headers for codegen test)
        run: nimble install -y "https://github.com/planetis-m/naylib"

      - name: Assert naylib discoverable (vita C-name verification depends on it)
        run: |
          test -n "$(find "$HOME/.nimble/pkgs2" -maxdepth 1 -name 'naylib-*' -type d)" \
            || { echo '::error::naylib not found in ~/.nimble/pkgs2 — vita C-name verification would be silently skipped'; exit 1; }

      - name: Run verify (type-check + vita gate + tests)
        run: ./scripts/verify.sh
