name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Vita gate note: scripts/verify.sh runs Nim --compileOnly codegen under
# -d:vita (--os:linux --cpu:amd64) and validates the generated C against
# tests/stubs/raylib.h via gcc -fsyntax-only. No VitaSDK / arm-vita-eabi-gcc
# required. This is type-check + C codegen only — NOT a cross-compile.
#
# Keep tests/stubs/raylib.h in sync with the host draw-proc surface in
# topdown/clckr raylib_console.nim (see raddy-5ce HOST_SYMBOL_VERIFY).

jobs:
  ci:
    name: Type-check, vita gate, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.x'

      - name: Install bddy (test framework)
        run: nimble install -y "https://github.com/mattsp1290/bddy"

      - name: Install naylib (raylib headers for codegen test)
        run: nimble install -y "https://github.com/planetis-m/naylib"

      - name: Run verify (type-check + vita gate + tests)
        run: ./scripts/verify.sh
