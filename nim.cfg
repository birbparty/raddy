--mm:orc
--threads:on
--hints:off

# --- C function-pointer const-correctness (desktop clang) ---------------------
# Nuklear's callback typedefs use `const char *` / `const struct *` params, but
# Nim emits `cstring`->`char *` and `pointer`->`void *` for the matching Nim
# proc types (nk_text_width_f in backend/font.nim, nk_plugin_filter in
# widgets.nim). These pointers are ABI-identical — const-qualification and
# void*/struct* do not change representation or calling convention — so the
# assignments are safe. Recent Apple clang promotes the resulting
# -Wincompatible-function-pointer-types from a warning to a hard error, which
# breaks `nimble test`. Demote it back to a warning. Clang-specific, so this is
# desktop-only; the Vita target uses gcc and does not C-compile in CI.
@if not vita:
  --passC:"-Wno-error=incompatible-function-pointer-types"
@end

# --- Sony PS Vita (VitaSDK) ---------------------------------------------------
# Inert unless -d:vita is passed; overrides desktop --mm:orc --threads:on.
# Toolchain path assumes $VITASDK=/usr/local/vitasdk (VitaSDK convention).
# --os:linux: newlib-based bare-metal ABI (same idiom as clckr/topdown).
# --mm:arc: ORC's cycle collector requires thread support; use ARC instead.
#   No ds3 target — raddy is desktop + Vita only.
@if vita:
  --cc:gcc
  --cpu:arm
  --os:linux
  --threads:off
  --mm:arc
  --opt:size
  --define:useMalloc
  --define:nimAllocPagesViaMalloc
  --define:noSignalHandler

  arm.linux.gcc.path      = "/usr/local/vitasdk/bin"
  arm.linux.gcc.exe       = "arm-vita-eabi-gcc"
  arm.linux.gcc.linkerexe = "arm-vita-eabi-gcc"

  --passC:"-mcpu=cortex-a9 -mfloat-abi=hard -mfpu=neon"
  --passC:"-D__vita__"
  # Linker flags (--passL), vpk packaging, and SELF signing are the consuming
  # game's responsibility (see topdown/clckr build scripts). This library
  # supplies only compilation flags; it does not produce a runnable Vita binary.
@end
